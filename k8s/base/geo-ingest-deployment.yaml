apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-ingest
  namespace: geoint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: geo-ingest
  template:
    metadata:
      labels:
        app: geo-ingest
    spec:
      initContainers:
        - name: wait-for-postgis
          image: postgres:15
          command: ['sh', '-c', 'until pg_isready -h postgis -p 5432; do sleep 2; done;']
      containers:
        - name: geo-ingest
          image: geo-ingest:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: postgis-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: postgis-config
                  key: DB_PORT  
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: postgis-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgis-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgis-secret
                  key: POSTGRES_PASSWORD